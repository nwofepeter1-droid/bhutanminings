<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bhutan Minings</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loginScreen" class="login">
  <h2>Bhutan Minings</h2>
  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" class="hidden">

  <header>Bhutan Minings Dashboard</header>

  <nav>
    <a href="#">Home</a>
    <a href="#">Mining</a>
    <a href="#">Plans</a>
    <a href="#">Support</a>
  </nav>

  <div class="hero">
    <h1>Mining Simulator</h1>
    <p>Track your virtual earnings</p>
    <button onclick="mine()">Start Mining</button>
  </div>

  <div class="dashboard">
    <h2>Your Balance</h2>
    <div class="balance-box">
      <p id="output">Balance: 0 BTC</p>
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <h3>Basic</h3>
      <p>Free plan</p>
    </div>

    <div class="card">
      <h3>Pro</h3>
      <p>Faster mining</p>
    </div>

    <div class="card">
      <h3>Elite</h3>
      <p>Best speed</p>
    </div>
  </div>

  <footer>© 2026 Bhutan Minings</footer>

</div>

<script src="game.js"></script>
<div class="chat">💬</div>

</body>
</html>
